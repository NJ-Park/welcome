<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>특별한 초대장이 도착했습니다!</title>
  <style>
    body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
    .card { background: white; width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; text-align: center; padding-bottom: 30px; }

    /* 사진 영역 */
    .photo-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 15px; background: #eee; }
    .photo-container img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; background: #ccc; }

    h1 { font-size: 1.5rem; margin-top: 20px; color: #333; }
    .quiz-container { padding: 20px; }

    /* 버튼 스타일 */
    .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #007bff; border-radius: 10px; background: white; color: #007bff; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn:hover { background: #007bff; color: white; }

    /* 쿠폰 영역 (기본 숨김) */
    #coupon-area { display: none; margin-top: 20px; padding: 20px; background: #fff9c4; border: 2px dashed #fbc02d; border-radius: 15px; animation: fadeIn 0.5s; }
    .coupon-title { font-size: 1.2rem; font-weight: bold; color: #f57f17; }
    .coupon-code { font-size: 1.5rem; letter-spacing: 2px; color: #333; margin: 10px 0; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="card">
  <div class="photo-container">
    <img src="./park.png" alt="친구1">
    <img src="./jung.png" alt="친구2">
    <img src="./choi.png" alt="친구3">
  </div>

  <h1>이 세 사람의 공통점은?</h1>

  <div class="quiz-container" id="quiz-box">
    <button class="btn" onclick="checkAnswer(false)">모두 같은 동네에 산다</button>
    <button class="btn" onclick="checkAnswer(true)">생일이 3월 4일로 똑같다!</button>
    <button class="btn" onclick="checkAnswer(false)">좋아하는 음식이 같다</button>
    <button class="btn" onclick="checkAnswer(false)">고등학교 동창이다</button>
  </div>

  <div id="coupon-area">
    <p class="coupon-title">🎉 정답입니다! 🎉</p>
    <p>파티에 오실 때 이 화면을 보여주세요.</p>
    <div class="coupon-code">입장료 50% 할인</div>
    <p style="font-size: 0.8rem; color: #888;">* 3월 1일 파티 현장에서만 유효</p>
  </div>
</div>

<script>
  function checkAnswer(isCorrect) {
    if (isCorrect) {
      alert("와우! 정확해요! 🎂");
      document.getElementById('quiz-box').style.display = 'none'; // 퀴즈 숨기기
      document.getElementById('coupon-area').style.display = 'block'; // 쿠폰 보이기
    } else {
      alert("땡! 다시 한 번 생각해보세요. 🤔");
    }
  }
</script>

</body>
</html>
